<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم أ. منيرة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid py-4">
        
        <div class="dashboard-header text-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-person-badge-fill text-primary"></i> لوحة إدارة منصة أ. منيرة</h2>
            <p class="text-muted">تحديث إعدادات المتجر ومتابعة طلبات الشحن</p>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-md-11">
                <div class="card shadow-sm border-0 rounded-4 p-3" style="border-right: 5px solid #0d6efd !important;">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3"><i class="bi bi-gear-fill text-success"></i> إعدادات التطبيق (الأسعار)</h5>
                        <div class="row g-2">
                            <div class="col-md-3">
                                <label class="small text-muted fw-bold">اختر التطبيق</label>
                                <select id="appSelect" class="form-select rounded-3">
                                    <option value="Bigo Live">Bigo Live</option>
                                    <option value="Hami Party">Hami Party</option>
                                    <option value="Amar">Amar</option>
                                    <option value="Honey Jar">Honey Jar</option>
                                    <option value="Taka">Taka</option>
                                    <option value="Yoki">Yoki</option>

                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted fw-bold">السعر</label>
                                <input type="number" id="newPriceInput" class="form-control rounded-3" placeholder="السعر (مثلاً: 0.014)" step="any">
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted fw-bold">الحد الأدنى</label>
                                <input type="number" id="minAmountInput" class="form-control rounded-3" placeholder="أقل كمية">
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button onclick="updateAppPrice()" class="btn btn-success w-100 fw-bold rounded-3">
                                    حفظ التعديلات <i class="bi bi-cloud-arrow-up"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 px-2">
            <h5 class="fw-bold m-0"><i class="bi bi-list-stars text-primary"></i> سجل الطلبات الواردة</h5>
            <button onclick="fetchOrders()" class="btn btn-primary rounded-pill px-4 shadow-sm">
                تحديث الجدول <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle m-0 text-center">
                        <thead class="table-light">
                            <tr>
                                <th>الاسم</th>
                                <th>التطبيق</th>
                                <th>الآيدي (ID)</th>
                                <th>الكمية</th>
                                <th>طريقة الدفع</th>
                                <th>التاريخ</th>
                                <th>إيصال الدفع</th>
                                <th>الحالة الحالية</th> <th>تغيير الحالة</th> </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="loader" class="text-center my-5 d-none">
            <div class="spinner-grow text-primary" role="status"></div>
            <p class="mt-2 text-primary fw-bold">جاري جلب الطلبات من جوجل شيت...</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
